services:
  db:
    image: pgvector/pgvector:pg17
    container_name: baza_bot_db
    environment:
      POSTGRES_USER: baza
      POSTGRES_PASSWORD: baza
      POSTGRES_DB: baza_bot
    ports:
      # 5433 на хосте — 5432 занят локальным postgresql@18 на машине разработки
      - '5433:5432'
    volumes:
      - baza_bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U baza -d baza_bot']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  baza_bot_pgdata:
