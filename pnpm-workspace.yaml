# Пакеты, которым разрешён postinstall build script (в pnpm 11 — здесь, не в package.json).
onlyBuiltDependencies:
  - prisma
  - '@prisma/client'
  - esbuild
  - vue-demi

# supply-chain minimumReleaseAge остаётся включённым. Свежие релизы Vue 3.5.40 и
# fast-xml-parser (моложе порога) — точечно исключены, как предложил pnpm при install.
# Целостность гарантируется integrity-хешами в pnpm-lock.yaml.
minimumReleaseAgeExclude:
  - '@vue/compiler-core@3.5.40'
  - '@vue/compiler-dom@3.5.40'
  - '@vue/compiler-sfc@3.5.40'
  - '@vue/compiler-ssr@3.5.40'
  - '@vue/reactivity@3.5.40'
  - '@vue/runtime-core@3.5.40'
  - '@vue/runtime-dom@3.5.40'
  - '@vue/server-renderer@3.5.40'
  - '@vue/shared@3.5.40'
  - fast-xml-parser@5.10.1
  - vue@3.5.40
  - '@tailwindcss/node@4.3.3'
  - '@tailwindcss/oxide-android-arm64@4.3.3'
  - '@tailwindcss/oxide-darwin-arm64@4.3.3'
  - '@tailwindcss/oxide-darwin-x64@4.3.3'
  - '@tailwindcss/oxide-freebsd-x64@4.3.3'
  - '@tailwindcss/oxide-linux-arm-gnueabihf@4.3.3'
  - '@tailwindcss/oxide-linux-arm64-gnu@4.3.3'
  - '@tailwindcss/oxide-linux-arm64-musl@4.3.3'
  - '@tailwindcss/oxide-linux-x64-gnu@4.3.3'
  - '@tailwindcss/oxide-linux-x64-musl@4.3.3'
  - '@tailwindcss/oxide-wasm32-wasi@4.3.3'
  - '@tailwindcss/oxide-win32-arm64-msvc@4.3.3'
  - '@tailwindcss/oxide-win32-x64-msvc@4.3.3'
  - '@tailwindcss/oxide@4.3.3'
  - '@tailwindcss/vite@4.3.3'
  - tailwindcss@4.3.3
  - shadcn-nuxt@2.8.0
